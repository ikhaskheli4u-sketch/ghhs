<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GBHSS Sindhri</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
        }
        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }
        .login-box h2 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .login-box p {
            color: var(--gray);
            margin-bottom: 2rem;
        }
        .login-box .form-group {
            text-align: left;
        }
        .login-box .btn {
            width: 100%;
            margin-top: 1rem;
        }
        .error-msg {
            color: #e53e3e;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--gray);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-icon">&#127891;</div>
            <h2>Admin Portal</h2>
            <p>GBHSS Sindhri Management System</p>
            <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="error-msg" id="login-error">Invalid username or password</div>
            </form>
            <p style="font-size: 0.8rem; margin-top: 1rem;">Demo: admin / admin123</p>
            <a href="index.html" class="back-link">&#8592; Back to Website</a>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        function handleAdminLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
        
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
